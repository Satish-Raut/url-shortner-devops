
version: "3.9"

services:

  # ─── BACKEND SERVICE ───────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: url-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_KEY: ${JWT_KEY}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FRONTEND SERVICE ──────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: url-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
